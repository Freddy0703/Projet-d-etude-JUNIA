<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Examens Médicaux · Smaragdine</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts (Inter) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, #eaf7f1 0%, #d4efdf 100%);
      min-height: 100vh;
      padding: 2rem 1rem;
      color: #13412f;
    }

    .examens-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(12px);
      border-radius: 56px;
      box-shadow: 0 30px 60px -20px #1a6043, 0 0 0 1px #6fc09c inset;
      padding: 2.5rem 2.8rem;
      border: 1px solid #b8e3ce;
    }

    /* En-tête */
    .header-zone {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      border-bottom: 3px solid #c7edd9;
      padding-bottom: 1.2rem;
    }

    h3 {
      font-weight: 700;
      font-size: 2.1rem;
      color: #0a5238;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0;
    }

    h3 i {
      background: #cdf0dd;
      color: #1e7a57;
      padding: 14px;
      border-radius: 44px;
      font-size: 1.8rem;
    }

    h4 {
      font-weight: 700;
      color: #166f48;
      margin: 2.2rem 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.8rem;
    }

    h4 i {
      background: #dbf3e6;
      padding: 12px;
      border-radius: 32px;
      color: #1b8558;
    }

    /* Boutons navigation */
    .nav-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-nav {
      background: #ebf9f2;
      border: 2px solid #95cfb4;
      border-radius: 40px;
      padding: 0.65rem 1.8rem;
      font-weight: 600;
      color: #1e6f4c;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }

    .btn-nav:hover {
      background: #c3ecdb;
      border-color: #44a77b;
      color: #0a4f33;
    }

    .btn-nav-info {
      background: #daf2e4;
      border-color: #70be99;
    }

    /* Tableau examens */
    .table-responsive {
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 15px 30px -15px #1c6043;
      background: white;
    }

    .table {
      margin-bottom: 0;
      background: white;
      border-collapse: separate;
      border-spacing: 0;
    }

    .table thead {
      background: #d6efe2;
    }

    .table thead th {
      color: #11573c;
      font-weight: 700;
      padding: 1.2rem 1rem;
      font-size: 0.95rem;
      border-bottom: 2px solid #97ceb3;
      text-transform: uppercase;
    }

    .table tbody tr {
      transition: background 0.15s;
    }

    .table tbody tr:hover {
      background: #eafbf2;
    }

    .table tbody td {
      padding: 1.2rem 1rem;
      vertical-align: middle;
      color: #1b513b;
      border-bottom: 1px solid #c4e6d4;
    }

    .badge-maladie {
      background: #e1f5ea;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-weight: 500;
      border: 1px solid #7dcba8;
      display: inline-block;
      font-size: 0.85rem;
    }

    .examen-id {
      font-weight: 700;
      color: #176f47;
      font-family: monospace;
      font-size: 0.95rem;
    }

    /* Boutons d'action */
    .btn-submit-sm {
      background: #198754;
      border: none;
      border-radius: 30px;
      padding: 0.35rem 1rem;
      font-weight: 600;
      color: white;
      font-size: 0.8rem;
      transition: 0.2s;
    }

    .btn-submit-sm:hover {
      background: #0f6c46;
    }

    .btn-update {
      background: #ffc107;
      border: none;
      border-radius: 30px;
      padding: 0.4rem 1rem;
      font-weight: 600;
      font-size: 0.8rem;
      color: #2b4d2b;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid #f9d98e;
    }

    .btn-update:hover {
      background: #e0a800;
    }

    .btn-delete {
      background: #dc3545;
      border: none;
      border-radius: 30px;
      padding: 0.4rem 1.2rem;
      font-weight: 600;
      font-size: 0.8rem;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      border: 1px solid #f1a3ad;
    }

    .btn-delete:hover {
      background: #b02a37;
    }

    /* Formulaire ajout examen */
    .form-card {
      background: #edfcf4;
      border-radius: 48px;
      padding: 2rem 2.3rem;
      border: 1px solid #9fd8bd;
      box-shadow: 0 10px 20px -8px #2b7455;
      margin-top: 2rem;
    }

    .form-label {
      font-weight: 600;
      color: #1f6746;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .form-control, .form-select {
      border: 2px solid #c2e6d4;
      border-radius: 36px;
      padding: 0.75rem 1.4rem;
      background: #fffffff2;
      transition: 0.2s;
    }

    .form-control:focus, .form-select:focus {
      border-color: #2ea975;
      box-shadow: 0 0 0 5px #b1e7d1;
      outline: none;
    }

    .btn-submit {
      background: #1b835b;
      border: none;
      border-radius: 40px;
      padding: 0.8rem 2.8rem;
      font-weight: 700;
      color: white;
      box-shadow: 0 8px 16px -6px #1b835b;
      transition: 0.2s;
      font-size: 1.1rem;
    }

    .btn-submit:hover {
      background: #0f6846;
      transform: translateY(-3px);
      box-shadow: 0 16px 22px -8px #125d3e;
    }

    /* Contexte dossier */
    .dossier-context {
      background: #daf0e4;
      border-radius: 48px;
      padding: 1rem 2rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      border: 1px solid #74c09d;
    }

    .dossier-badge {
      background: white;
      border-radius: 60px;
      padding: 0.6rem 1.8rem;
      font-weight: 700;
      color: #1e6e4b;
      border: 1px solid #5cb78c;
    }

    /* Formulaire de modification inline */
    .inline-form {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .inline-input {
      border-radius: 30px;
      border: 1px solid #bcddc9;
      padding: 0.4rem 0.8rem;
      font-size: 0.85rem;
      background: white;
    }

    .inline-select {
      border-radius: 30px;
      border: 1px solid #bcddc9;
      padding: 0.4rem 0.8rem;
      font-size: 0.85rem;
      background: white;
    }

    .action-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="examens-wrapper">
    <!-- En-tête avec navigation -->
    <div class="header-zone">
      <h3>
        <i class="fa-regular fa-microscope"></i> 
        Examens Médicaux
      </h3>
      <div class="nav-buttons">
        <a href="/medecin/dossiers?patient=" id="backToDossiers" class="btn-nav btn-nav-info">
          <i class="fa-regular fa-folder-open"></i> Dossiers
        </a>
        <a href="/medecin/dashboard" class="btn-nav">
          <i class="fa-regular fa-chart-pie"></i> Dashboard
        </a>
      </div>
    </div>

    <!-- Contexte dossier -->
    <div class="dossier-context">
      <i class="fa-regular fa-folder" style="color: #1a7f56; font-size: 1.6rem;"></i>
      <span style="font-weight: 500;">Dossier ID :</span>
      <span class="dossier-badge" id="dossierIdDisplay">—</span>
      <span style="color:#2b7355;"><i class="fa-regular fa-leaf"></i> Examens associés</span>
    </div>

    <!-- Info patient -->
    <div class="patient-context" style="background: #e8f6ef; border-radius: 40px; padding: 0.8rem 1.5rem; margin-bottom: 1.5rem; border: 1px solid #9fd8bd;">
      <i class="fa-regular fa-user" style="color: #1a7f56;"></i>
      <span id="patientName" style="font-weight: 600; color: #0a5238;">Chargement...</span>
    </div>

    <!-- Tableau des examens -->
    <div class="table-responsive">
      <table class="table">
        <thead>
          <tr>
            <th><i class="fa-regular fa-hashtag me-1"></i> ID Examen</th>
            <th><i class="fa-regular fa-flask"></i> Nom Examen</th>
            <th><i class="fa-regular fa-virus"></i> Maladie</th>
            <th><i class="fa-regular fa-calendar-check"></i> Date Résultat</th>
            <th class="text-center"><i class="fa-regular fa-gear"></i> Actions</th>
          </tr>
        </thead>
        <tbody id="examensTable">
          <!-- injecté via JS -->
        </tbody>
      </table>
    </div>

    <!-- Formulaire d'ajout d'examen -->
    <div class="form-card">
      <h4><i class="fa-regular fa-plus-circle"></i> Ajouter un examen</h4>
      <form action="/api/medecin/examen/add" method="POST">
        <input type="hidden" id="idDossier" name="idDossier" value="">
        <div class="row g-4">
          <div class="col-md-4">
            <label for="nom" class="form-label"><i class="fa-regular fa-file-signature"></i> Nom Examen</label>
            <input type="text" class="form-control" id="nom" name="nom" required>
          </div>
          <div class="col-md-4">
            <label for="maladie" class="form-label"><i class="fa-regular fa-disease"></i> Maladie</label>
            <select class="form-select" id="maladie" name="idMaladie">
              <option value="">-- Sélectionner --</option>
            </select>
          </div>
          <div class="col-md-4">
            <label for="dateResultat" class="form-label"><i class="fa-regular fa-calendar-plus"></i> Date Résultat</label>
            <input type="date" class="form-control" id="dateResultat" name="dateResultat">
          </div>
        </div>
        <div class="row mt-4">
          <div class="col-12">
            <button type="submit" class="btn-submit w-100">
              <i class="fa-regular fa-save"></i> Ajouter l'examen
            </button>
          </div>
        </div>
      </form>
    </div>

    <!-- Footer léger -->
    <div class="mt-5 text-center text-success-emphasis" style="color: #256f4c;">
      <i class="fa-regular fa-shield-check"></i> Backend préservé · design harmonisé
    </div>
  </div>

  <script>
    // === AUCUNE MODIFICATION BACKEND (juste l'habillage) ===
    const pathParts = window.location.pathname.split('/');
    const dossierId = pathParts[pathParts.length - 1];
    const urlParams = new URLSearchParams(window.location.search);
    const patientId = urlParams.get('patient');

    // Afficher l'ID dossier
    document.getElementById('dossierIdDisplay').innerHTML = `<i class="fa-regular fa-folder-open me-1"></i> ${dossierId}`;
    document.getElementById('idDossier').value = dossierId;
    
    // Mettre à jour le lien retour
    const backLink = document.getElementById('backToDossiers');
    if (backLink) {
      backLink.href = "/medecin/dossiers?patient=" + (patientId || '');
    }

    let allExamens = [];
    let maladiesList = [];

    function formatDate(dateString) {
      if (!dateString) return '';
      const d = new Date(dateString);
      if (isNaN(d.getTime())) return dateString;
      return d.toISOString().split('T')[0];
    }

    // Charger infos patient
    if (patientId && patientId !== 'null') {
      fetch('/api/medecin/patient/' + patientId)
        .then(res => res.json())
        .then(data => {
          const patientSpan = document.getElementById('patientName');
          if (data && (data.prenom || data.nom)) {
            patientSpan.innerHTML = `<i class="fa-regular fa-user-circle me-1"></i> Patient : ${data.prenom || ''} ${data.nom || ''}`;
          } else {
            patientSpan.innerHTML = `<i class="fa-regular fa-user-circle me-1"></i> Patient ID : ${patientId}`;
          }
        })
        .catch(err => {
          console.warn('⚠️ Infos patient non disponibles', err);
          document.getElementById('patientName').innerHTML = `<i class="fa-regular fa-user-circle me-1"></i> Patient ID : ${patientId}`;
        });
    } else {
      document.getElementById('patientName').innerHTML = '<i class="fa-regular fa-user-circle me-1"></i> Patient non spécifié';
    }

    // Charger maladies
    fetch('/api/maladies')
      .then(res => res.json())
      .then(data => {
        maladiesList = data;
        const select = document.getElementById('maladie');
        select.innerHTML = '<option value="">-- Sélectionner --</option>';
        data.forEach(m => {
          select.innerHTML += `<option value="${m.idMaladie}">${m.nom}</option>`;
        });
      })
      .catch(err => {
        console.warn('⚠️ API maladies non disponible', err);
        const select = document.getElementById('maladie');
        select.innerHTML = '<option value="">-- Aucune maladie --</option>';
      });

    // Charger examens
    fetch('/api/medecin/examens/' + dossierId)
      .then(res => res.json())
      .then(data => {
        allExamens = data;
        renderTable(allExamens);
      })
      .catch(err => {
        console.warn('⚠️ API examens non disponible — affichage placeholder');
        allExamens = [
          { idExamen: 'EX-001', nom: 'Bilan sanguin', maladie: 'Diabète', dateResultat: '2025-03-15' },
          { idExamen: 'EX-002', nom: 'Électrocardiogramme', maladie: 'Hypertension', dateResultat: '2025-03-20' },
        ];
        renderTable(allExamens);
      });

    function getMaladieName(idMaladie) {
      const maladie = maladiesList.find(m => m.idMaladie == idMaladie);
      return maladie ? maladie.nom : '';
    }

    function renderTable(examens) {
      const tbody = document.getElementById('examensTable');
      tbody.innerHTML = '';

      if (!examens.length) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-muted"><i class="fa-regular fa-folder-exclamation"></i> Aucun examen pour ce dossier</td></tr>`;
        return;
      }

      examens.forEach(e => {
        const idExamen = e.idExamen || '';
        const nomExamen = e.nom || '';
        const maladieName = e.maladie || (e.idMaladie ? getMaladieName(e.idMaladie) : '');
        const dateResultat = e.dateResultat || '';

        const updateAction = `/api/medecin/examen/edit/${idExamen}`;
        const deleteLink = `/api/medecin/examen/delete/${idExamen}?dossier=${dossierId}`;

        const row = document.createElement('tr');
        row.innerHTML = `
          <td><span class="examen-id">#${idExamen}</span></td>
          <td><span class="fw-medium">${escapeHtml(nomExamen)}</span></td>
          <td>${maladieName ? `<span class="badge-maladie"><i class="fa-regular fa-bug me-1"></i>${escapeHtml(maladieName)}</span>` : '<span class="text-muted">—</span>'}</td>
          <td>${dateResultat ? `<span class="badge-date"><i class="fa-regular fa-calendar me-1"></i>${formatDate(dateResultat)}</span>` : '<span class="text-muted">—</span>'}</td>
          <td>
            <div class="action-group">
              <form action="${updateAction}" method="POST" class="inline-form">
                <input type="hidden" name="idDossier" value="${dossierId}">
                <input type="text" name="nom" value="${escapeHtml(nomExamen)}" class="inline-input" style="width:130px;" placeholder="Nom">
                <select name="idMaladie" class="inline-select">
                  <option value="">Aucune</option>
                  ${maladiesList.map(m => `<option value="${m.idMaladie}" ${(e.idMaladie == m.idMaladie || e.maladie === m.nom) ? 'selected' : ''}>${escapeHtml(m.nom)}</option>`).join('')}
                </select>
                <input type="date" name="dateResultat" value="${formatDate(dateResultat)}" class="inline-input" style="width:130px;">
                <button type="submit" class="btn-update">
                  <i class="fa-regular fa-pen-to-square"></i> Modifier
                </button>
              </form>
              <a href="${deleteLink}" class="btn-delete" onclick="return confirm('Supprimer cet examen ?');">
                <i class="fa-regular fa-trash-can"></i> Supprimer
              </a>
            </div>
           </tr>
        `;
        tbody.appendChild(row);
      });
    }

    // Petite fonction utilitaire anti-XSS
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
  </script>
</body>
</html>
